# docker-compose.windows-test.yml
# Override for local Windows testing — no GCP/BigQuery required.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.windows-test.yml up -d
#   (the start_test.bat script does this automatically)
#
# What this changes vs production:
#   1. Uses Dockerfile.xai (adds matplotlib / pillow / bigquery)
#   2. Removes GCP service-account volume mount from freqtrade
#   3. Disables bq_sync service entirely
#   4. Grafana uses only the Freqtrade REST API datasource (no BigQuery)
#   5. All ports stay the same: freqtrade :8080, grafana :3000

version: "3.9"

services:

  freqtrade:
    # Replace pre-built image with our XAI-extended build
    image: freqtrade-xai:local
    build:
      context: .
      dockerfile: Dockerfile.xai
    # Override volumes — remove GCP secrets mount, add plot_evidence
    volumes:
      - ./user_data:/freqtrade/user_data
      - ./config.json:/freqtrade/config.json:ro
      - ./plot_evidence.py:/freqtrade/plot_evidence.py:ro
    environment:
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_API_SECRET=${ALPACA_API_SECRET}
      - FREQTRADE_JWT_SECRET=${FREQTRADE_JWT_SECRET}
      - FREQTRADE_API_PASSWORD=${FREQTRADE_API_PASSWORD}
      # GCP not required for test — explanation_engine fails gracefully
      - GCP_PROJECT_ID=test-project
      - BQ_DATASET=alpacatrader
      - FREQTRADE_USER_DIR=/freqtrade/user_data
    ports:
      - "8888:8888"          # IIS ocupa 8080 no Windows

  # Disable BigQuery sync — no GCP credentials in test environment
  bq_sync:
    entrypoint: ["echo", "BQ sync disabled in Windows test mode"]
    restart: "no"
    depends_on: []

  grafana:
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource
      # BigQuery plugin NOT installed in test mode (no GCP)
      - GCP_PROJECT_ID=test-project
